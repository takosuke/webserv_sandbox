http {
	server {
		listen 127.0.0.1:8080 default_server;
		server_name localhost;

		root /home/marcampo/Public/webserv;

		error_page 404 404.html;
		error_page 500 501 502 503 504 50x.html;

		location / {
			root /home/marcampo/Public/webserv/www;
		}
	}
	server {
		listen 127.0.0.1:8081 default_server;
		server_name localhost;

		root /home/marcampo/Public/webserv;

		error_page 404 404.html;
		error_page 500 501 502 503 504 50x.html;

		location / {
			root /home/marcampo/Public/webserv/www;
		}
		location /poop {
			root /home/marcampo/Public/webserv/www/poop;
		}
	}
}
