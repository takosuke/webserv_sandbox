http {
	server {
		listen 127.0.0.1:8080 default_server;
		server_name localhost;

		root __WWWROOT__;

		# Default file for directory requests. Exercises the handle_setup bug
		# where `index` sets _req.path = <index> (an absolute root-relative path)
		# instead of appending to the requested directory, so GET /idxdir/ serves
		# the root index.html rather than www/idxdir/index.html.
		index index.html;

		error_page 404 /404.html;
		error_page 500 501 502 503 504 /50x.html;

		location / {
			root __WWWROOT__;
		}
	}
}
