http {
	server {
		listen 127.0.0.1:8080 default_server;
		server_name localhost;

		root __WWWROOT__;

		error_page 404 /404.html;
		error_page 500 501 502 503 504 /50x.html;

		# Any file ending in .bla is handled by the cgi_test executable.
		location \ .bla {
			root __WWWROOT__;
			cgi_pass __WWWROOT__/cgi-bin/cgi_test;
		}

		location /post_body {
			root __WWWROOT__;
			client_max_body_size 100;
		}

		# Served from the YoupiBanane fixture repo. When a directory itself is
		# requested (no file named), youpi.bad_extension is used as the index.
		location /directory/ {
			root __WWWROOT__/YoupiBanane;
			index youpi.bad_extension;
		}

		# Only GET is allowed at the root.
		location / {
			root __WWWROOT__;
			limit_except GET;
		}
	}
}
