http {
	server {
		listen 127.0.0.1:8080 default_server;
		server_name localhost;

		root __WWWROOT__;

		# Sized far above the 1024 default so a long request line should fit.
		# Exercises the ScratchBuffer::set_capacity bug: the directive is parsed
		# but never actually resizes the buffer (capacity member is not updated).
		client_header_buffer_size 16384;

		error_page 404 /404.html;
		error_page 500 501 502 503 504 /50x.html;

		# Internal redirect to a real file. Exercises the handle_setup bug where
		# `return` sets _req.path but never re-resolves _loc, so the same
		# location's `return` fires every iteration until REDIRECT_LIMIT -> 500.
		location /old {
			return 301 /index.html;
		}

		# External redirect (absolute URL). This path works today: it sets
		# internal=false and breaks the redirect loop.
		location /ext {
			return 302 https://example.com/;
		}

		location / {
			root __WWWROOT__;
		}
	}
}
