http {
	server {
		listen 127.0.0.1:8080 default_server;
		server_name localhost;

		root /home/takosuke/42/webserv_sandbox/www;

		error_page 404 /404.html;
		error_page 500 501 502 503 504 /50x.html;

		# More specific prefix — served from the static sub-directory
		location /static {
			root /home/takosuke/42/webserv_sandbox/www;
		}

		# CGI subtree
		location /cgi-bin {
			root /home/takosuke/42/webserv_sandbox/www;
			cgi_pass /usr/bin/python3;
		}

		# Catch-all
		location / {
			root /home/takosuke/42/webserv_sandbox/www;
		}
	}
}
