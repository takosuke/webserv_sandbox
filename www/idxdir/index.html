<h1>SUBDIR-INDEX-MARKER-9F3A</h1>
<p>This file is www/idxdir/index.html. A correct `index` directive serves it for
GET /idxdir/. If the server serves the root index.html instead, the `index`
directive is replacing the whole path rather than appending to the directory.</p>
